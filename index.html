<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mc Anthonio | SYNTX V4 Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #ffb800; font-family: 'Roboto Mono', monospace; overflow-x: hidden; }
        .bloomberg-panel { border: 1px solid #222; background: #000; transition: all 0.3s; }
        .alert-glow { box-shadow: 0 0 20px rgba(255, 184, 0, 0.4); border-color: #ffb800 !important; }
    </style>
</head>
<body class="p-4 md:p-8 uppercase">

    <header class="flex justify-between items-center border-b-2 border-orange-600 pb-4 mb-6">
        <div>
            <h1 class="text-white font-bold text-xl">RAKOTOMANGA MICHEL ANTHONIO</h1>
            <p class="text-orange-500 text-xs">DOMAIN: MC-ANTHONIO.COM | SYNTX V4</p>
        </div>
        <div id="clock" class="bg-blue-900 text-white px-6 py-2 font-bold text-lg">ANTANANARIVO: --:--:--</div>
    </header>

    <div id="prep-zone" class="mb-6"></div>

    <div class="grid grid-cols-2 md:grid-cols-5 gap-4" id="market-grid">
        </div>

    <script>
        const indices = ['GainX 400', 'PainX 400', 'GainX 600', 'PainX 600', 'GainX 800', 'PainX 800', 'GainX 999', 'PainX 999', 'GainX 1200', 'PainX 1200'];
        const alertSound = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');

        // 1. HORLOGE MADAGASCAR
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = "ANTANANARIVO: " + now.toLocaleTimeString('fr-FR', {timeZone: 'Indian/Antananarivo'});
        }
        setInterval(updateTime, 1000);

        // 2. MOTEUR VISUEL
        function buildGrid() {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = indices.map(idx => `
                <div id="card-${idx.replace(' ','')}" class="bloomberg-panel p-4 rounded">
                    <div class="text-[10px] text-gray-500 border-b border-gray-800 mb-2">${idx}</div>
                    <div id="status-${idx.replace(' ','')}" class="text-[11px] text-blue-400">SCANNING...</div>
                    <div class="w-full bg-gray-900 h-1 mt-3 rounded-full overflow-hidden">
                        <div class="bg-green-600 h-full w-1/2 animate-pulse"></div>
                    </div>
                </div>
            `).join('');
        }

        // 3. GESTION DES PRÉ-ALERTES ET COMPTE À REBOURS
        function simulateLogic() {
            const luckyIdx = indices[Math.floor(Math.random() * indices.length)];
            const cardId = `card-${luckyIdx.replace(' ','')}`;
            const statusId = `status-${luckyIdx.replace(' ','')}`;
            
            // Déclenchement Alerte
            document.getElementById(cardId).classList.add('alert-glow');
            document.getElementById(statusId).innerHTML = "<span class='text-orange-500 font-bold'>PRE-SIGNAL ⚠️</span>";
            alertSound.play().catch(() => {});
            
            // Lancement Compte à Rebours
            startCountdown(luckyIdx);
            
            setTimeout(() => {
                document.getElementById(cardId).classList.remove('alert-glow');
                document.getElementById(statusId).innerText = "SCANNING...";
            }, 120000);
        }

        function startCountdown(asset) {
            let time = 120;
            const zone = document.getElementById('prep-zone');
            const timer = setInterval(() => {
                time--;
                zone.innerHTML = `
                    <div class="bg-orange-900/50 border-2 border-orange-500 p-6 rounded flex justify-between items-center">
                        <div>
                            <h2 class="text-white font-bold">ALERTE PRÉPARATION : ${asset}</h2>
                            <p class="text-xs text-orange-300">ORDRE IMMINENT - PRÉPAREZ VOTRE PLATEFORME WELTRADE</p>
                        </div>
                        <div class="text-4xl font-bold text-white">${Math.floor(time/60)}:${(time%60).toString().padStart(2,'0')}</div>
                    </div>
                `;
                if(time <= 0) {
                    clearInterval(timer);
                    zone.innerHTML = "<div class='bg-green-600 text-white p-4 rounded font-bold text-center'>SIGNAL DÉPLOYÉ SUR TELEGRAM ✅</div>";
                    setTimeout(() => zone.innerHTML = '', 5000);
                }
            }, 1000);
        }

        // 4. NOTIFICATIONS PUSH
        window.onload = () => {
            if ("Notification" in window) Notification.requestPermission();
            buildGrid();
            setInterval(simulateLogic, 45000); // Une alerte toutes les 45s pour le test
        };
    </script>
</body>
          </html>
